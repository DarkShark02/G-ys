<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G*YS</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center; /* centra la board su schermi piccoli */
    align-items: center;
    padding: 20px; /* piccolo padding laterale */
}

.board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    justify-content: space-between;
    align-items: center;
    width: 100%;
    gap: 20px; /* spazio tra le card */
    box-sizing: border-box;
}

.card {
    width: 100%;
    max-width: 350px; 
    height: auto; /* lascia che l’altezza segua il video/immagine */
    aspect-ratio: 7/11; /* mantiene proporzioni simili a 350x550 */
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    transform-style: preserve-3d;
}

.card:hover {
    transform: scale(1.07) translateY(-10px);
}

.card img,
.card video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.card video {
    position: absolute;
    top: 0;
    left: 0;
    display: none;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card,
.card img,
.card video {
    -webkit-tap-highlight-color: transparent;
}

/* MEDIA QUERY PER CELLULARE */
@media (max-width: 600px) {
    .board {
        grid-template-columns: 1fr;/* le card vanno in colonna */
        gap: 20px;
        align-items: center;
    }

    .card {
        max-width: 90vw; /* quasi tutta la larghezza dello schermo */
        aspect-ratio: 7/11; /* mantiene proporzioni */
    }
}
</style>
</head>
<body>

<div class="board">

    <div class="card" onclick="toggleMedia(this)">
        <img src="Immagini/flavio.png" />
        <video src="Video/flavio.mp4"></video>
    </div>

    <div class="card" onclick="toggleMedia(this)">
        <img src="Immagini/manu.png" />
        <video src="Video/manu.mp4"></video>
    </div>

    <div class="card" onclick="toggleMedia(this)">
        <img src="Immagini/momo.jpeg" />
        <video src="Video/momo.mp4"></video>
    </div>

    <div class="card" onclick="toggleMedia(this)">
        <img src="Immagini/ajten.png" />
        <video src="Video/ajten.mp4"></video>
    </div>

    <div class="card" onclick="toggleMedia(this)">
        <img src="Immagini/rolly.png" />
        <video src="Video/rolly.mp4"></video>
    </div>

    <div class="card" onclick="toggleMedia(this)">
        <img src="Immagini/fabio.png" />
        <video src="Video/fabio.mp4"></video>
    </div>

    <div class="card" onclick="toggleMedia(this)">
        <img src="Immagini/frank.png" />
        <video src="Video/frank.mp4"></video>
    </div>

    <div class="card" onclick="toggleMedia(this)">
        <img src="Immagini/kantite.png" />
        <video src="Video/kantite.mp4"></video>
    </div>
</div>


<script>
function toggleMedia(card) {
    const img = card.querySelector("img");
    const video = card.querySelector("video");

    if (video.style.display === "block") {
        resetToImage(img, video);
    } else {
        img.style.display = "none";
        video.style.display = "block";
        video.play();

        video.onended = () => {
            resetToImage(img, video);
        };
    }
}

function resetToImage(img, video) {
    video.pause();
    video.currentTime = 0;
    video.style.display = "none";
    img.style.display = "block";
}
</script>

</body>
</html>
